<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Login & Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

    body {
      background-color: rgba(0,0,0,0.795);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; height: 100vh;
    }

    /* Toast notification */
    #toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 28px; border-radius: 8px; font-size: 13px; font-weight: 600;
      color: #fff; z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #22c55e; }
    #toast.error   { background: #ef4444; }

    .container {
      background-color: #fff; border-radius: 30px;
      box-shadow: 0 5px 15px rgba(255,255,255,0.35);
      position: relative; overflow: hidden;
      width: 768px; max-width: 100%; min-height: 480px;
    }
    .container p  { font-size: 14px; line-height: 20px; letter-spacing: 0.3px; margin: 20px 0; }
    .container span { font-size: 12px; }
    .container a  { color: #333; font-size: 13px; text-decoration: none; margin: 15px 0 10px; }

    .container button {
      background-color: rgb(255,13,13); color: #fff; font-size: 12px;
      padding: 10px 45px; border: 1px solid transparent; border-radius: 8px;
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      margin-top: 10px; cursor: pointer; transition: opacity 0.2s;
    }
    .container button:disabled { opacity: 0.6; cursor: not-allowed; }
    .container button.hidden   { background-color: transparent; border-color: #fff; }

    .container form {
      background-color: #fff; display: flex; align-items: center;
      justify-content: center; flex-direction: column;
      padding: 0 40px; height: 100%;
    }
    .container input {
      background-color: #eee; border: none; margin: 8px 0;
      padding: 10px 15px; font-size: 13px; border-radius: 8px;
      width: 100%; outline: none;
    }

    .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }

    .sign-in { left: 0; width: 50%; z-index: 2; }
    .container.active .sign-in { transform: translateX(100%); }

    .sign-up { left: 0; width: 50%; opacity: 0; z-index: 1; }
    .container.active .sign-up { transform: translateX(100%); opacity: 1; z-index: 5; animation: move 0.6s; }

    @keyframes move {
      0%, 49.99% { opacity: 0; z-index: 1; }
      50%, 100%  { opacity: 1; z-index: 5; }
    }

    .social-icons { margin: 20px 0; }
    .social-icons a {
      border: 1px solid #ccc; border-radius: 20%;
      display: inline-flex; justify-content: center; align-items: center;
      margin: 0 3px; width: 40px; height: 40px;
    }

    .toggle-container {
      position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
      overflow: hidden; transition: all 0.6s ease-in-out;
      border-radius: 20px; z-index: 1000;
    }
    .container.active .toggle-container { transform: translateX(-100%); border-radius: 20px; }

    .toggle {
      background-color: rgba(255,4,4,0.952); height: 100%; color: #fff;
      position: relative; left: -100%; width: 200%;
      transform: translateX(0); transition: all 0.6s ease-in-out;
    }
    .container.active .toggle { transform: translateX(50%); }

    .toggle-panel {
      position: absolute; width: 50%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 0 30px; text-align: center;
      top: 0; transform: translateX(0); transition: all 0.6s ease-in-out;
    }
    .toggle-left  { transform: translateX(-200%); }
    .container.active .toggle-left { transform: translateX(0); }
    .toggle-right { right: 0; transform: translateX(0); }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="container" id="container">

  <!-- SIGN UP -->
  <div class="form-container sign-up">
    <form onsubmit="return false">
      <h1>Create Account</h1>
      <div class="social-icons">
        <a href="#" class="icons"><i class='bx bxl-google'></i></a>
        <a href="#" class="icons"><i class='bx bxl-facebook'></i></a>
        <a href="#" class="icons"><i class='bx bxl-github'></i></a>
        <a href="#" class="icons"><i class='bx bxl-linkedin'></i></a>
      </div>
      <span>Register with Username & Password</span>
      <input id="reg-username" type="text" placeholder="Username" required/>
      <input id="reg-password" type="password" placeholder="Password" required/>
      <button id="btn-register" onclick="register()">Sign Up</button>
    </form>
  </div>

  <!-- SIGN IN -->
  <div class="form-container sign-in">
    <form onsubmit="return false">
      <h1>Sign In</h1>
      <div class="social-icons">
        <a href="#" class="icons"><i class='bx bxl-google'></i></a>
        <a href="#" class="icons"><i class='bx bxl-facebook'></i></a>
        <a href="#" class="icons"><i class='bx bxl-github'></i></a>
        <a href="#" class="icons"><i class='bx bxl-linkedin'></i></a>
      </div>
      <span>Login with Username & Password</span>
      <input id="login-username" type="text" placeholder="Username" required/>
      <input id="login-password" type="password" placeholder="Password" required/>
      <a href="#">Forget Password?</a>
      <button id="btn-login" onclick="login()">Sign In</button>
    </form>
  </div>

  <!-- TOGGLE -->
  <div class="toggle-container">
    <div class="toggle">
      <div class="toggle-panel toggle-left">
        <h1>Welcome Back!</h1>
        <p>Sign in with your account</p>
        <button class="hidden" id="login-toggle">Sign In</button>
      </div>
      <div class="toggle-panel toggle-right">
        <h1>Hello!</h1>
        <p>Register a new account to get started</p>
        <button class="hidden" id="register-toggle">Sign Up</button>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8080';

  // Toggle panel
  document.getElementById('register-toggle').addEventListener('click', () => {
    document.getElementById('container').classList.add('active');
  });
  document.getElementById('login-toggle').addEventListener('click', () => {
    document.getElementById('container').classList.remove('active');
  });

  // Toast
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3000);
  }

  // Register
  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();

    if (!username || !password) return showToast('Vui lòng nhập đầy đủ!', 'error');

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = 'Đang xử lý...';

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (res.ok) {
        showToast('Đăng ký thành công! Hãy đăng nhập.', 'success');
        document.getElementById('reg-username').value = '';
        document.getElementById('reg-password').value = '';
        // Chuyển sang form login
        setTimeout(() => document.getElementById('container').classList.remove('active'), 1000);
      } else {
        showToast(data.error || 'Đăng ký thất bại!', 'error');
      }
    } catch (e) {
      showToast('Không kết nối được server!', 'error');
    }

    btn.disabled = false; btn.textContent = 'Sign Up';
  }

  // Login
  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) return showToast('Vui lòng nhập đầy đủ!', 'error');

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Đang xử lý...';

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        showToast('Đăng nhập thành công!', 'success');
        // Chuyển trang sau 1 giây
        setTimeout(() => window.location.href = 'users.html', 1000);
      } else {
        showToast(data.error || 'Sai tài khoản hoặc mật khẩu!', 'error');
      }
    } catch (e) {
      showToast('Không kết nối được server!', 'error');
    }

    btn.disabled = false; btn.textContent = 'Sign In';
  }
</script>
</body>
</html>
