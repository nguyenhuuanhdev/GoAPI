<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Quản lý Users</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

    body {
      background-color: #f0f2f5;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: #fff;
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar .brand {
      font-size: 18px; font-weight: 700; color: #e00;
      display: flex; align-items: center; gap: 8px;
    }
    .navbar .user-info {
      display: flex; align-items: center; gap: 16px;
      font-size: 13px; color: #555;
    }
    .btn-logout {
      background: #e00; color: #fff; border: none;
      padding: 7px 18px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      letter-spacing: 0.5px; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: #c00; }

    /* MAIN */
    .main { max-width: 900px; margin: 32px auto; padding: 0 16px; }

    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 28px; margin-bottom: 24px;
    }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #222; }

    /* FORM */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row input {
      flex: 1; min-width: 120px;
      background: #f0f2f5; border: 1.5px solid transparent;
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; outline: none; transition: border 0.2s;
    }
    .form-row input:focus { border-color: #e00; }
    .form-row button {
      padding: 10px 22px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; text-transform: uppercase; transition: opacity 0.2s;
    }
    .form-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #e00; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #c00; }
    .btn-cancel  { background: #eee; color: #555; }
    .btn-cancel:hover { background: #ddd; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #fafafa; }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 12px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1.5px solid #f0f0f0;
    }
    td {
      padding: 14px 16px; font-size: 13px; color: #333;
      border-bottom: 1px solid #f5f5f5;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge-id {
      background: #fff0f0; color: #e00;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }

    .action-btns { display: flex; gap: 8px; }
    .btn-edit {
      background: #fff8e1; color: #f59e0b; border: none;
      padding: 6px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: background 0.2s;
    }
    .btn-edit:hover { background: #fef3c7; }
    .btn-delete {
      background: #fff0f0; color: #e00; border: none;
      padding: 6px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #fee2e2; }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 48px 0;
      color: #aaa; font-size: 14px;
    }
    .empty i { font-size: 48px; display: block; margin-bottom: 12px; }

    /* TOAST */
    #toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 28px; border-radius: 8px; font-size: 13px; font-weight: 600;
      color: #fff; z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #22c55e; }
    #toast.error   { background: #ef4444; }

    /* LOADING */
    .loading { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="brand">
    <i class='bx bx-shield-quarter'></i> GoAPI Dashboard
  </div>
  <div class="user-info">
    <span>👤 <strong id="nav-username">...</strong></span>
    <button class="btn-logout" onclick="logout()">
      <i class='bx bx-log-out'></i> Đăng xuất
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- FORM THÊM / SỬA -->
  <div class="card">
    <h2 id="form-title">➕ Thêm User mới</h2>
    <div class="form-row">
      <input id="f-id"   placeholder="ID" />
      <input id="f-name" placeholder="Tên" />
      <input id="f-age"  placeholder="Tuổi" type="number" min="1" />
      <button class="btn-primary" id="btn-submit" onclick="submitForm()">Thêm</button>
      <button class="btn-cancel"  id="btn-cancel" style="display:none" onclick="cancelEdit()">Huỷ</button>
    </div>
  </div>

  <!-- DANH SÁCH -->
  <div class="card">
    <h2>👥 Danh sách Users</h2>
    <div id="table-wrap">
      <div class="loading"><i class='bx bx-loader-alt bx-spin'></i> Đang tải...</div>
    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8080';
  let editingId = null;

  // ─── AUTH CHECK ────────────────────────────────────────────
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'index.html';
  }

  // Decode JWT để lấy username hiển thị navbar
  function parseJwt(t) {
    try {
      return JSON.parse(atob(t.split('.')[1]));
    } catch { return {}; }
  }
  const payload = parseJwt(token);
  document.getElementById('nav-username').textContent = payload.username || 'User';

  // ─── HEADERS ───────────────────────────────────────────────
  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };
  }

  // ─── TOAST ─────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3000);
  }

  // ─── LOGOUT ────────────────────────────────────────────────
  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  }

  // ─── LOAD USERS ────────────────────────────────────────────
  async function loadUsers() {
    document.getElementById('table-wrap').innerHTML =
      `<div class="loading"><i class='bx bx-loader-alt bx-spin'></i> Đang tải...</div>`;

    try {
      const res = await fetch(`${API}/api/users`, { headers: authHeaders() });

      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
        return;
      }

      const users = await res.json();

      if (!users || users.length === 0) {
        document.getElementById('table-wrap').innerHTML = `
          <div class="empty">
            <i class='bx bx-user-x'></i>
            Chưa có user nào. Thêm user đầu tiên!
          </div>`;
        return;
      }

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Tên</th><th>Tuổi</th><th>Thao tác</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td><span class="badge-id">${u.id}</span></td>
                <td>${u.name}</td>
                <td>${u.age}</td>
                <td>
                  <div class="action-btns">
                    <button class="btn-edit" onclick="editUser('${u.id}','${u.name}',${u.age})">
                      <i class='bx bx-edit'></i> Sửa
                    </button>
                    <button class="btn-delete" onclick="deleteUser('${u.id}')">
                      <i class='bx bx-trash'></i> Xoá
                    </button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      document.getElementById('table-wrap').innerHTML =
        `<div class="empty"><i class='bx bx-error'></i> Không kết nối được server!</div>`;
    }
  }

  // ─── SUBMIT FORM ───────────────────────────────────────────
  async function submitForm() {
    const id   = document.getElementById('f-id').value.trim();
    const name = document.getElementById('f-name').value.trim();
    const age  = parseInt(document.getElementById('f-age').value);

    if (!name || !age) return showToast('Vui lòng nhập đầy đủ!', 'error');

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;

    try {
      if (editingId) {
        // CẬP NHẬT
        const res = await fetch(`${API}/api/users/${editingId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ name, age })
        });
        if (res.ok) { showToast('Cập nhật thành công!'); cancelEdit(); }
        else showToast('Cập nhật thất bại!', 'error');
      } else {
        // THÊM MỚI
        if (!id) return showToast('Vui lòng nhập ID!', 'error');
        const res = await fetch(`${API}/api/users`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ id, name, age })
        });
        if (res.ok) {
          showToast('Thêm user thành công!');
          document.getElementById('f-id').value = '';
          document.getElementById('f-name').value = '';
          document.getElementById('f-age').value = '';
        } else showToast('Thêm thất bại! ID có thể đã tồn tại.', 'error');
      }
      loadUsers();
    } catch (e) {
      showToast('Không kết nối được server!', 'error');
    }

    btn.disabled = false;
  }

  // ─── EDIT ──────────────────────────────────────────────────
  function editUser(id, name, age) {
    editingId = id;
    document.getElementById('f-id').value = id;
    document.getElementById('f-id').disabled = true;
    document.getElementById('f-name').value = name;
    document.getElementById('f-age').value = age;
    document.getElementById('btn-submit').textContent = 'Cập nhật';
    document.getElementById('btn-cancel').style.display = 'inline-block';
    document.getElementById('form-title').textContent = '✏️ Chỉnh sửa User';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('f-id').value = '';
    document.getElementById('f-id').disabled = false;
    document.getElementById('f-name').value = '';
    document.getElementById('f-age').value = '';
    document.getElementById('btn-submit').textContent = 'Thêm';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('form-title').textContent = '➕ Thêm User mới';
  }

  // ─── DELETE ────────────────────────────────────────────────
  async function deleteUser(id) {
    if (!confirm(`Xoá user "${id}"?`)) return;
    try {
      const res = await fetch(`${API}/api/users/${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (res.ok) { showToast('Đã xoá user!'); loadUsers(); }
      else showToast('Xoá thất bại!', 'error');
    } catch (e) {
      showToast('Không kết nối được server!', 'error');
    }
  }

  // ─── INIT ──────────────────────────────────────────────────
  loadUsers();
</script>
</body>
</html>
